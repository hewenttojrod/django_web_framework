name: django_web_framework
services:
  db:
    image: mysql:latest
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: taskboard_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: "Password6^"
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - ../data/mysql:/var/lib/mysql
    ports:
      - "3306:3306"

  redis:
    image: redis:latest
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ../data/redis:/data

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    
    working_dir: /app
    # Frontend build is expected to be done outside the container; start Django only.
    command: sh -c "python docker/wait_for_db.py && python manage.py runsslserver 0.0.0.0:8000 --certificate /app/docker/certs/cert.pem --key /app/docker/certs/key.pem"
    volumes:
      - ..:/app
      - ../static/taskboard/dist:/app/web_core/workspace/taskboard/static/taskboard/dist:ro
      - staticfiles:/app/staticfiles
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=taskboard_db
      - DB_USER=admin
      - DB_PASSWORD=Password6^
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DJANGO_SETTINGS_MODULE=web_core.settings
      - CSRF_TRUSTED_ORIGINS=https://localhost:8000,https://127.0.0.1:8000
    depends_on:
      - db
      - redis

  # Note: Vite dev server removed; frontend assets should be built externally.

  web_test:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    
    working_dir: /app
    command: sh -c "python docker/wait_for_db.py && python manage.py runserver 0.0.0.0:8000 --settings=web_core.settings_test"
    volumes:
      - ..:/app
      - ../static/taskboard/dist:/app/web_core/workspace/taskboard/static/taskboard/dist:ro
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=taskboard_db
      - DB_USER=admin
      - DB_PASSWORD=Password6^
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DJANGO_SETTINGS_MODULE=web_core.settings_test
    depends_on:
      - db
      - redis
    networks:
      default:
        aliases:
          - web-test

  ui:
    build:
      context: ..
      dockerfile: docker/ui.Dockerfile
    
    working_dir: /app/ui-tests
    # No bind-mounts for `ui` so baked-in node_modules remain available.
    # If you want to develop tests locally, remove these lines and rebuild the image.
    environment:
      - PLAYWRIGHT_BASE_URL=http://web-test:8000
    depends_on:
      - web_test
    tty: true

# Using bind mounts so database files live inside the repo `data/` directory

volumes:
  staticfiles:
