name: taskboard
services:
  db:
    image: mysql:latest
    container_name: db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: taskboard_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: "Password6^"
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - ../data/mysql:/var/lib/mysql
    ports:
      - "3306:3306"

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ../data/redis:/data

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: web
    working_dir: /app
    command: sh -c "cd core/workspace/taskboard && if [ -f package.json ]; then npm install --silent || true; npm run dev:css & fi; cd /app && python docker/wait_for_db.py && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=taskboard_db
      - DB_USER=admin
      - DB_PASSWORD=Password6^
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DJANGO_SETTINGS_MODULE=core.settings
    depends_on:
      - db
      - redis

  # Note: Vite dev server removed; Tailwind CSS is run inside `web`.

  web_test:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: web_test
    working_dir: /app
    command: sh -c "python docker/wait_for_db.py && python manage.py runserver 0.0.0.0:8000 --settings=core.settings_test"
    volumes:
      - ..:/app
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=taskboard_db
      - DB_USER=admin
      - DB_PASSWORD=Password6^
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DJANGO_SETTINGS_MODULE=core.settings_test
    depends_on:
      - db
      - redis
    networks:
      default:
        aliases:
          - web-test

  ui:
    build:
      context: ..
      dockerfile: docker/ui.Dockerfile
    container_name: ui
    working_dir: /app/ui-tests
    # No bind-mounts for `ui` so baked-in node_modules remain available.
    # If you want to develop tests locally, remove these lines and rebuild the image.
    environment:
      - PLAYWRIGHT_BASE_URL=http://web-test:8000
    depends_on:
      - web
    tty: true

# Using bind mounts so database files live inside the repo `data/` directory
